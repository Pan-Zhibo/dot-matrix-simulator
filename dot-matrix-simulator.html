<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点阵屏模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Roboto Mono', monospace;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }
    h1 {
      font-size: 1.2rem;
      color: #00ff88;
      text-align: center;
    }
    .container {
      display: flex;
      gap: 16px;
      flex: 1;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 280px;
    }
    .panel-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .panel-section h3 {
      font-size: 0.85rem;
      color: #00ff88;
      border-bottom: 1px solid #00ff8844;
      padding-bottom: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      font-size: 0.8rem;
      color: #aaa;
      min-width: 56px;
    }
    input[type="number"] {
      background: #0f3460;
      border: 1px solid #00ff8844;
      border-radius: 6px;
      color: #fff;
      padding: 6px 10px;
      width: 70px;
      font-family: inherit;
      font-size: 0.85rem;
    }
    input[type="text"] {
      background: #0f3460;
      border: 1px solid #00ff8844;
      border-radius: 6px;
      color: #fff;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.9rem;
      width: 100%;
    }
    input[type="range"] {
      flex: 1;
      accent-color: #00ff88;
    }
    input[type="color"] {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }
    .mode-toggle {
      display: flex;
      gap: 8px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #00ff8844;
      border-radius: 6px;
      background: #0f3460;
      color: #aaa;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: #00ff88;
      color: #1a1a2e;
      border-color: #00ff88;
    }
    .color-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .preset-color {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .preset-color:hover {
      transform: scale(1.15);
    }
    .preset-color.selected {
      border-color: #fff;
    }
    .unit-colors {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 120px;
      overflow-y: auto;
    }
    .unit-color-item {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #0f3460;
      padding: 4px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
    }
    .unit-color-item input[type="color"] {
      width: 24px;
      height: 24px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.85;
    }
    .btn-clear {
      background: #e94560;
      color: #fff;
    }
    .btn-fill {
      background: #00ff88;
      color: #1a1a2e;
    }
    .preview-area {
      flex: 1;
      background: #0f0f1a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    #canvas {
      image-rendering: pixelated;
    }
    .preview-label {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 0.7rem;
      color: #444;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column-reverse;
      }
      .panel {
        min-width: unset;
      }
    }
  </style>
</head>
<body>
  <h1>◆ 点阵屏模拟器 ◆</h1>

  <div class="container">
    <div class="panel">
      <!-- 布局配置 -->
      <div class="panel-section">
        <h3>布局配置</h3>
        <div class="row">
          <label>竖排:</label>
          <input type="number" id="rows" min="1" max="10" value="3">
          <label>横排:</label>
          <input type="number" id="cols" min="1" max="10" value="4">
          <button onclick="applyLayout()" style="flex:0;padding:6px 12px;background:#00ff88;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;">应用</button>
        </div>
      </div>

      <!-- 文字输入 -->
      <div class="panel-section">
        <h3>文字显示</h3>
        <input type="text" id="textInput" placeholder="输入文字..." value="Hello World">
        <div class="row">
          <label>字体大小</label>
          <input type="range" id="fontSize" min="8" max="24" value="12">
          <span id="fontSizeVal">12px</span>
        </div>
      </div>

      <!-- 显示模式 -->
      <div class="panel-section">
        <h3>显示模式</h3>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeScroll" onclick="setMode('scroll')">滚动字幕</button>
          <button class="mode-btn" id="modeStatic" onclick="setMode('static')">静态显示</button>
        </div>
        <div class="row">
          <label>滚动速度</label>
          <input type="number" id="speed" min="10" max="500" value="50">
          <span style="font-size:0.75rem;color:#888;">ms/步</span>
        </div>
      </div>

      <!-- 颜色配置 -->
      <div class="panel-section">
        <h3>颜色配置</h3>
        <div class="color-presets" id="presets"></div>
        <div class="unit-colors" id="unitColors"></div>
      </div>

      <!-- 亮度 -->
      <div class="panel-section">
        <h3>亮度调节</h3>
        <div class="row">
          <label>亮度</label>
          <input type="range" id="brightness" min="20" max="100" value="100">
          <span id="brightnessVal">100%</span>
        </div>
      </div>

      <!-- 功能按钮 -->
      <div class="panel-section">
        <div class="btn-row">
          <button class="btn-clear" onclick="clearAll()">清屏</button>
          <button class="btn-fill" onclick="fillAll()">全亮</button>
        </div>
      </div>
    </div>

    <div class="preview-area">
      <canvas id="canvas"></canvas>
      <div class="preview-label">预览区域</div>
    </div>
  </div>

  <script>
    // 配置
    const UNIT = 8;        // 每组8×8
    const LED_SIZE = 6;     // 每个LED像素大小
    const LED_GAP = 2;      // LED间距
    const CELL_SIZE = LED_SIZE + LED_GAP;

    // 状态
    let config = {
      rows: 3,
      cols: 4,
      text: 'Hello World',
      fontSize: 12,
      mode: 'scroll',
      speed: 50,
      brightness: 1,
      colors: [],          // 每个单元的颜色
      scrollOffset: 0,
      animationId: null,
      presetColor: '#ff0000'
    };

    // 预设颜色
    const PRESET_COLORS = [
      { name: '红', hex: '#ff0000' },
      { name: '绿', hex: '#00ff00' },
      { name: '蓝', hex: '#0088ff' },
      { name: '黄', hex: '#ffff00' },
      { name: '青', hex: '#00ffff' },
      { name: '粉', hex: '#ff00ff' },
      { name: '橙', hex: '#ff8800' },
      { name: '白', hex: '#ffffff' }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // 初始化
    function init() {
      // 初始化颜色数组
      initColors();
      // 渲染预设颜色
      renderPresets();
      // 渲染单元颜色选择器
      renderUnitColors();
      // 应用布局
      applyLayout();
      // 绑定事件
      bindEvents();
      // 开始动画
      startAnimation();
    }

    function initColors() {
      const total = config.rows * config.cols;
      config.colors = [];
      for (let i = 0; i < total; i++) {
        config.colors.push(PRESET_COLORS[0].hex);
      }
    }

    function renderPresets() {
      const container = document.getElementById('presets');
      container.innerHTML = '';
      PRESET_COLORS.forEach((c, i) => {
        const btn = document.createElement('div');
        btn.className = 'preset-color' + (i === 0 ? ' selected' : '');
        btn.style.background = c.hex;
        btn.title = c.name;
        btn.onclick = () => selectPreset(c.hex, btn);
        container.appendChild(btn);
      });
    }

    function selectPreset(hex, btn) {
      document.querySelectorAll('.preset-color').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      config.presetColor = hex;
    }

    function renderUnitColors() {
      const container = document.getElementById('unitColors');
      container.innerHTML = '';
      const total = config.rows * config.cols;
      for (let i = 0; i < total; i++) {
        const div = document.createElement('div');
        div.className = 'unit-color-item';
        div.innerHTML = `
          <span>${Math.floor(i / config.cols) + 1}-${(i % config.cols) + 1}</span>
          <input type="color" value="${config.colors[i]}" onchange="setUnitColor(${i}, this.value)">
        `;
        container.appendChild(div);
      }
    }

    function setUnitColor(index, color) {
      config.colors[index] = color;
      draw();
    }

    function bindEvents() {
      // 字体大小
      document.getElementById('fontSize').addEventListener('input', (e) => {
        config.fontSize = parseInt(e.target.value);
        document.getElementById('fontSizeVal').textContent = config.fontSize + 'px';
        draw();
      });

      // 滚动速度
      document.getElementById('speed').addEventListener('change', (e) => {
        config.speed = parseInt(e.target.value) || 50;
      });

      // 文字输入
      document.getElementById('textInput').addEventListener('input', (e) => {
        config.text = e.target.value || ' ';
        config.scrollOffset = 0;
      });

      // 亮度
      document.getElementById('brightness').addEventListener('input', (e) => {
        config.brightness = parseInt(e.target.value) / 100;
        document.getElementById('brightnessVal').textContent = e.target.value + '%';
        draw();
      });
    }

    function applyLayout() {
      config.rows = parseInt(document.getElementById('rows').value) || 3;
      config.cols = parseInt(document.getElementById('cols').value) || 4;
      initColors();
      renderUnitColors();
      resizeCanvas();
      draw();
    }

    function resizeCanvas() {
      const preview = document.querySelector('.preview-area');
      const maxW = preview.clientWidth - 32;
      const maxH = preview.clientHeight - 32;

      const w = config.cols * UNIT * CELL_SIZE;
      const h = config.rows * UNIT * CELL_SIZE;

      // 缩放以适应
      const scale = Math.min(maxW / w, maxH / h, 1);
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = (w * scale) + 'px';
      canvas.style.height = (h * scale) + 'px';
    }

    function setMode(mode) {
      config.mode = mode;
      document.getElementById('modeScroll').classList.toggle('active', mode === 'scroll');
      document.getElementById('modeStatic').classList.toggle('active', mode === 'static');
      if (mode === 'static') {
        stopAnimation();
      } else {
        startAnimation();
      }
    }

    function startAnimation() {
      if (config.animationId) return;
      let lastTime = 0;
      function animate(time) {
        if (time - lastTime >= config.speed) {
          lastTime = time;
          config.scrollOffset += 1;
          draw();
        }
        config.animationId = requestAnimationFrame(animate);
      }
      config.animationId = requestAnimationFrame(animate);
    }

    function stopAnimation() {
      if (config.animationId) {
        cancelAnimationFrame(config.animationId);
        config.animationId = null;
      }
    }

    function clearAll() {
      stopAnimation();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function fillAll() {
      stopAnimation();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const w = canvas.width;
      const h = canvas.height;
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const idx = r * config.cols + c;
          ctx.fillStyle = config.colors[idx];
          ctx.shadowColor = config.colors[idx];
          ctx.shadowBlur = 4 * config.brightness;
          for (let led = 0; led < UNIT * UNIT; led++) {
            const px = c * UNIT * CELL_SIZE + (led % UNIT) * CELL_SIZE;
            const py = r * UNIT * CELL_SIZE + Math.floor(led / UNIT) * CELL_SIZE;
            ctx.fillRect(px, py, LED_SIZE, LED_SIZE);
          }
        }
      }
    }

    function draw() {
      const w = canvas.width;
      const h = canvas.height;

      // 清屏
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);

      // 绘制每个单元
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const idx = r * config.cols + c;
          drawUnit(c, r, idx);
        }
      }

      // 绘制文字
      drawText();
    }

    function drawUnit(col, row, idx) {
      const ox = col * UNIT * CELL_SIZE;
      const oy = row * UNIT * CELL_SIZE;
      const color = config.colors[idx];

      ctx.shadowColor = color;
      ctx.shadowBlur = 6 * config.brightness;
      ctx.fillStyle = color;

      // 绘制每个LED点
      for (let y = 0; y < UNIT; y++) {
        for (let x = 0; x < UNIT; x++) {
          const px = ox + x * CELL_SIZE;
          const py = oy + y * CELL_SIZE;
          // 画成圆形更像LED
          ctx.beginPath();
          ctx.arc(px + LED_SIZE / 2, py + LED_SIZE / 2, LED_SIZE / 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawText() {
      if (!config.text) return;

      const totalUnits = config.rows * config.cols;
      const totalLEDsW = totalUnits * UNIT;  // 总横向LED数
      const totalLEDsH = config.rows * UNIT;  // 总纵向LED数

      // 创建离屏canvas来获取文字像素
      const offCanvas = document.createElement('canvas');
      const scale = 1;
      offCanvas.width = totalLEDsW * scale;
      offCanvas.height = totalLEDsH * scale;
      const offCtx = offCanvas.getContext('2d');

      // 绘制文字
      offCtx.fillStyle = '#fff';
      offCtx.font = `bold ${config.fontSize * 2}px 'Roboto Mono', monospace`;
      offCtx.textAlign = 'center';
      offCtx.textBaseline = 'middle';
      offCtx.fillText(config.text, offCanvas.width / 2, offCanvas.height / 2);

      // 获取文字范围（用于滚动计算）
      const textMetrics = offCtx.measureText(config.text);
      const textWidth = textMetrics.width * scale;

      // 根据模式计算绘制偏移
      let textOffsetX = 0;
      if (config.mode === 'scroll') {
        textOffsetX = -config.scrollOffset;
        // 循环滚动：当文字完全滚出左边时重置
        if (-textOffsetX > textWidth + offCanvas.width / 2) {
          config.scrollOffset = -(textWidth + offCanvas.width / 2);
        }
      } else {
        // 静态模式：居中
        textOffsetX = 0;
      }

      // 绘制到主canvas
      ctx.save();
      ctx.globalCompositeOperation = 'source-atop';
      const bright = config.brightness;
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const idx = r * config.cols + c;
          const ox = c * UNIT * CELL_SIZE;
          const oy = r * UNIT * CELL_SIZE;

          for (let ledY = 0; ledY < UNIT; ledY++) {
            for (let ledX = 0; ledX < UNIT; ledX++) {
              // 计算对应离屏canvas的坐标
              const srcX = Math.floor(c * UNIT + ledX - textOffsetX / 2 + offCanvas.width / 2);
              const srcY = Math.floor(r * UNIT + ledY);

              if (srcX >= 0 && srcX < offCanvas.width && srcY >= 0 && srcY < offCanvas.height) {
                const pixel = offCtx.getImageData(srcX, srcY, 1, 1).data;
                if (pixel[3] > 128) {
                  // 有文字的地方，用单元颜色点亮
                  ctx.fillStyle = config.colors[idx];
                  ctx.shadowColor = config.colors[idx];
                  ctx.shadowBlur = 8 * bright;
                  const px = ox + ledX * CELL_SIZE;
                  const py = oy + ledY * CELL_SIZE;
                  ctx.beginPath();
                  ctx.arc(px + LED_SIZE / 2, py + LED_SIZE / 2, LED_SIZE / 2, 0, Math.PI * 2);
                  ctx.fill();
                }
              }
            }
          }
        }
      }
      ctx.restore();
    }

    // 窗口大小变化时重绘
    window.addEventListener('resize', () => {
      resizeCanvas();
      draw();
    });

    // 启动
    init();
  </script>
</body>
</html>
