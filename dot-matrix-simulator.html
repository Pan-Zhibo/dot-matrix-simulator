<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点阵屏模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto Mono', monospace;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }
    h1 { font-size: 1.2rem; color: #00ff88; text-align: center; }
    .container {
      display: flex;
      gap: 16px;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 300px;
      max-width: 360px;
      overflow-y: auto;
      max-height: 90vh;
    }
    .panel-section { display: flex; flex-direction: column; gap: 8px; }
    .panel-section h3 {
      font-size: 0.8rem;
      color: #00ff88;
      border-bottom: 1px solid #00ff8844;
      padding-bottom: 4px;
    }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    label { font-size: 0.78rem; color: #aaa; min-width: 52px; }
    input[type="number"], input[type="text"] {
      background: #0f3460;
      border: 1px solid #00ff8844;
      border-radius: 6px;
      color: #fff;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.85rem;
    }
    input[type="number"] { width: 65px; }
    input[type="text"] { width: 100%; }
    input[type="range"] { flex: 1; min-width: 80px; accent-color: #00ff88; }
    input[type="color"] {
      width: 32px; height: 32px;
      border: none; border-radius: 6px;
      cursor: pointer; background: none; padding: 0;
    }
    .value-display { font-size: 0.75rem; color: #888; min-width: 40px; text-align: right; }
    .mode-toggle { display: flex; gap: 6px; }
    .mode-btn {
      flex: 1; padding: 8px;
      border: 1px solid #00ff8844; border-radius: 6px;
      background: #0f3460; color: #aaa;
      cursor: pointer; font-family: inherit; font-size: 0.78rem;
      transition: all 0.2s;
    }
    .mode-btn.active { background: #00ff88; color: #1a1a2e; border-color: #00ff88; }
    .color-presets { display: flex; gap: 5px; flex-wrap: wrap; }
    .preset-color {
      width: 26px; height: 26px; border-radius: 5px;
      border: 2px solid transparent; cursor: pointer; transition: transform 0.15s;
    }
    .preset-color:hover { transform: scale(1.15); }
    .preset-color.selected { border-color: #fff; }
    .unit-colors { display: flex; flex-wrap: wrap; gap: 4px; max-height: 140px; overflow-y: auto; }
    .unit-color-item {
      display: flex; align-items: center; gap: 3px;
      background: #0f3460; padding: 3px 6px; border-radius: 4px; font-size: 0.68rem;
    }
    .unit-color-item span { color: #888; }
    .unit-color-item input[type="color"] { width: 22px; height: 22px; }
    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 0.82rem; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-clear { background: #e94560; color: #fff; }
    .btn-fill { background: #00ff88; color: #1a1a2e; }
    .preview-area {
      flex: 1;
      background: #0a0a14;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      position: relative;
      min-height: 400px;
    }
    #canvas { image-rendering: pixelated; }
    .preview-label {
      position: absolute; bottom: 8px; right: 12px;
      font-size: 0.65rem; color: #333;
    }
    @media (max-width: 768px) {
      .container { flex-direction: column-reverse; }
      .panel { min-width: unset; max-width: unset; max-height: none; }
      .preview-area { min-height: 300px; }
    }
  </style>
</head>
<body>
  <h1>◆ 点阵屏模拟器 ◆</h1>

  <div class="container">
    <div class="panel">
      <!-- 布局配置 -->
      <div class="panel-section">
        <h3>布局配置</h3>
        <div class="row">
          <label>竖排:</label>
          <input type="number" id="rows" min="1" max="10" value="3">
          <label>横排:</label>
          <input type="number" id="cols" min="1" max="10" value="4">
          <button onclick="applyLayout()" style="flex:0;padding:6px 12px;background:#00ff88;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;">应用</button>
        </div>
      </div>

      <!-- 文字输入 -->
      <div class="panel-section">
        <h3>文字显示</h3>
        <input type="text" id="textInput" placeholder="输入文字..." value="Hello World">
        <div class="row">
          <label>字体大小</label>
          <input type="range" id="fontSize" min="8" max="24" value="12">
          <span class="value-display" id="fontSizeVal">12px</span>
        </div>
      </div>

      <!-- 显示模式 -->
      <div class="panel-section">
        <h3>显示模式</h3>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeScroll" onclick="setMode('scroll')">滚动字幕</button>
          <button class="mode-btn" id="modeStatic" onclick="setMode('static')">静态显示</button>
        </div>
        <div class="row">
          <label>滚动速度</label>
          <input type="number" id="speed" min="10" max="500" value="50" style="width:60px;">
          <span class="value-display">ms/步</span>
        </div>
      </div>

      <!-- 颜色配置 -->
      <div class="panel-section">
        <h3>颜色配置</h3>
        <div class="color-presets" id="presets"></div>
        <div style="font-size:0.7rem;color:#666;margin-top:4px;">点下方颜色可单独修改每个单元</div>
        <div class="unit-colors" id="unitColors"></div>
      </div>

      <!-- 亮度 -->
      <div class="panel-section">
        <h3>亮度调节</h3>
        <div class="row">
          <label>亮度</label>
          <input type="range" id="brightness" min="20" max="100" value="100">
          <span class="value-display" id="brightnessVal">100%</span>
        </div>
      </div>

      <!-- 功能按钮 -->
      <div class="panel-section">
        <div class="btn-row">
          <button class="btn-clear" onclick="clearAll()">清屏</button>
          <button class="btn-fill" onclick="fillAll()">全亮</button>
        </div>
      </div>
    </div>

    <div class="preview-area">
      <canvas id="canvas"></canvas>
      <div class="preview-label">预览区域</div>
    </div>
  </div>

  <script>
    const UNIT = 8;
    const LED_SIZE = 5;
    const LED_GAP = 1.5;
    const CELL = LED_SIZE + LED_GAP;

    let config = {
      rows: 3,
      cols: 4,
      text: 'Hello World',
      fontSize: 12,
      mode: 'scroll',
      speed: 50,
      brightness: 1,
      colors: [],
      scrollOffset: 0,
      animId: null,
      presetColor: '#ff0000'
    };

    const PRESETS = [
      { hex: '#ff0000', name: '红' }, { hex: '#00ff00', name: '绿' },
      { hex: '#0088ff', name: '蓝' }, { hex: '#ffff00', name: '黄' },
      { hex: '#00ffff', name: '青' }, { hex: '#ff00ff', name: '粉' },
      { hex: '#ff8800', name: '橙' }, { hex: '#ffffff', name: '白' }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function init() {
      initColors();
      renderPresets();
      renderUnitColors();
      applyLayout();
      bindEvents();
      startAnim();
    }

    function initColors() {
      config.colors = [];
      for (let i = 0; i < config.rows * config.cols; i++) {
        config.colors.push(PRESETS[0].hex);
      }
    }

    function renderPresets() {
      const c = document.getElementById('presets');
      c.innerHTML = '';
      PRESETS.forEach((p, i) => {
        const d = document.createElement('div');
        d.className = 'preset-color' + (i === 0 ? ' selected' : '');
        d.style.background = p.hex;
        d.title = p.name;
        d.onclick = () => {
          document.querySelectorAll('.preset-color').forEach(x => x.classList.remove('selected'));
          d.classList.add('selected');
          config.presetColor = p.hex;
          // apply to all units
          config.colors = config.colors.map(() => p.hex);
          renderUnitColors();
          draw();
        };
        c.appendChild(d);
      });
    }

    function renderUnitColors() {
      const c = document.getElementById('unitColors');
      c.innerHTML = '';
      for (let i = 0; i < config.rows * config.cols; i++) {
        const d = document.createElement('div');
        d.className = 'unit-color-item';
        d.innerHTML = `
          <span>${Math.floor(i / config.cols) + 1}-${(i % config.cols) + 1}</span>
          <input type="color" value="${config.colors[i]}" onchange="setColor(${i}, this.value)">
        `;
        c.appendChild(d);
      }
    }

    function setColor(idx, color) {
      config.colors[idx] = color;
      draw();
    }

    function bindEvents() {
      document.getElementById('fontSize').addEventListener('input', e => {
        config.fontSize = parseInt(e.target.value);
        document.getElementById('fontSizeVal').textContent = config.fontSize + 'px';
        draw();
      });
      document.getElementById('speed').addEventListener('change', e => {
        config.speed = parseInt(e.target.value) || 50;
      });
      document.getElementById('textInput').addEventListener('input', e => {
        config.text = e.target.value || ' ';
        config.scrollOffset = 0;
      });
      document.getElementById('brightness').addEventListener('input', e => {
        config.brightness = parseInt(e.target.value) / 100;
        document.getElementById('brightnessVal').textContent = e.target.value + '%';
        draw();
      });
    }

    function applyLayout() {
      config.rows = parseInt(document.getElementById('rows').value) || 3;
      config.cols = parseInt(document.getElementById('cols').value) || 4;
      initColors();
      renderUnitColors();
      resizeCanvas();
      draw();
    }

    function resizeCanvas() {
      const area = document.querySelector('.preview-area');
      const maxW = area.clientWidth - 40;
      const maxH = area.clientHeight - 60;
      const w = config.cols * UNIT * CELL;
      const h = config.rows * UNIT * CELL;
      const s = Math.min(maxW / w, maxH / h, 1.5);
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = (w * s) + 'px';
      canvas.style.height = (h * s) + 'px';
    }

    function setMode(m) {
      config.mode = m;
      document.getElementById('modeScroll').classList.toggle('active', m === 'scroll');
      document.getElementById('modeStatic').classList.toggle('active', m === 'static');
      if (m === 'static') stopAnim();
      else startAnim();
    }

    function startAnim() {
      if (config.animId) return;
      let last = 0;
      function tick(t) {
        if (t - last >= config.speed) {
          last = t;
          config.scrollOffset++;
          draw();
        }
        config.animId = requestAnimationFrame(tick);
      }
      config.animId = requestAnimationFrame(tick);
    }

    function stopAnim() {
      if (config.animId) { cancelAnimationFrame(config.animId); config.animId = null; }
    }

    function clearAll() {
      stopAnim();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function fillAll() {
      stopAnim();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const i = r * config.cols + c;
          ctx.shadowBlur = 5 * config.brightness;
          ctx.shadowColor = config.colors[i];
          ctx.fillStyle = config.colors[i];
          for (let y = 0; y < UNIT; y++) {
            for (let x = 0; x < UNIT; x++) {
              const px = c * UNIT * CELL + x * CELL;
              const py = r * UNIT * CELL + y * CELL;
              ctx.beginPath();
              ctx.arc(px + LED_SIZE/2, py + LED_SIZE/2, LED_SIZE/2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const off = renderTextToBitmap();
      const totalW = config.cols * UNIT;
      const totalH = config.rows * UNIT;

      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const i = r * config.cols + c;
          ctx.shadowBlur = 8 * config.brightness;
          ctx.shadowColor = config.colors[i];
          ctx.fillStyle = config.colors[i];
          for (let ly = 0; ly < UNIT; ly++) {
            for (let lx = 0; lx < UNIT; lx++) {
              const gx = c * UNIT + lx;
              const gy = r * UNIT + ly;
              const bit = getBit(off, gx, gy, totalW, totalH);
              if (bit) {
                const px = c * UNIT * CELL + lx * CELL;
                const py = r * UNIT * CELL + ly * CELL;
                ctx.beginPath();
                ctx.arc(px + LED_SIZE/2, py + LED_SIZE/2, LED_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }
        }
      }
    }

    // 渲染文字到位图（每bit代表一个像素点）
    function renderTextToBitmap() {
      const totalW = config.cols * UNIT;
      const totalH = config.rows * UNIT;
      const scale = 2;
      const oc = document.createElement('canvas');
      oc.width = totalW * scale;
      oc.height = totalH * scale;
      const octx = oc.getContext('2d');

      octx.fillStyle = '#000';
      octx.fillRect(0, 0, oc.width, oc.height);

      octx.fillStyle = '#fff';
      octx.font = `bold ${config.fontSize * scale * 1.5}px 'Roboto Mono', monospace`;
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';

      let textX = oc.width / 2;
      if (config.mode === 'scroll') {
        textX = oc.width + config.scrollOffset * scale;
      }

      octx.fillText(config.text, textX, oc.height / 2);

      const imgData = octx.getImageData(0, 0, oc.width, oc.height).data;
      const bits = [];

      for (let y = 0; y < totalH; y++) {
        for (let x = 0; x < totalW; x++) {
          let on = false;
          const sx = Math.floor(x * scale + scale / 2);
          const sy = Math.floor(y * scale + scale / 2);
          const idx = (sy * oc.width + sx) * 4;
          if (imgData[idx + 3] > 80) on = true;
          bits.push(on ? 1 : 0);
        }
      }

      // 滚动重置
      if (config.mode === 'scroll') {
        const textW = octx.measureText(config.text).width * scale;
        if (textX + textW / 2 < 0) {
          config.scrollOffset = -Math.ceil(oc.width / scale);
        }
      }

      return bits;
    }

    function getBit(bits, x, y, w, h) {
      if (x < 0 || x >= w || y < 0 || y >= h) return 0;
      return bits[y * w + x];
    }

    window.addEventListener('resize', () => { resizeCanvas(); draw(); });
    init();
  </script>
</body>
</html>
