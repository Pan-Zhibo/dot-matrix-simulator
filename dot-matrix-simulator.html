<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点阵屏模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto Mono', 'Consolas', 'Monaco', monospace;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }
    h1 { font-size: 1.2rem; color: #00ff88; text-align: center; }
    .container {
      display: flex;
      gap: 16px;
      flex: 1;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 300px;
      max-width: 360px;
      overflow-y: auto;
      max-height: 90vh;
    }
    .panel-section { display: flex; flex-direction: column; gap: 8px; }
    .panel-section h3 {
      font-size: 0.8rem; color: #00ff88;
      border-bottom: 1px solid #00ff8844; padding-bottom: 4px;
    }
    .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    label { font-size: 0.78rem; color: #aaa; min-width: 52px; }
    input[type="number"], input[type="text"] {
      background: #0f3460; border: 1px solid #00ff8844;
      border-radius: 6px; color: #fff; padding: 6px 10px;
      font-family: inherit; font-size: 0.85rem;
    }
    input[type="number"] { width: 65px; }
    input[type="text"] { width: 100%; }
    input[type="range"] { flex: 1; min-width: 80px; accent-color: #00ff88; }
    input[type="color"] {
      width: 32px; height: 32px; border: none; border-radius: 6px;
      cursor: pointer; background: none; padding: 0;
    }
    .value-display { font-size: 0.75rem; color: #888; min-width: 40px; text-align: right; }
    .mode-toggle { display: flex; gap: 6px; }
    .mode-btn {
      flex: 1; padding: 8px; border: 1px solid #00ff8844; border-radius: 6px;
      background: #0f3460; color: #aaa; cursor: pointer;
      font-family: inherit; font-size: 0.78rem; transition: all 0.2s;
    }
    .mode-btn.active { background: #00ff88; color: #1a1a2e; border-color: #00ff88; }
    .color-presets { display: flex; gap: 5px; flex-wrap: wrap; }
    .preset-color {
      width: 26px; height: 26px; border-radius: 5px;
      border: 2px solid transparent; cursor: pointer; transition: transform 0.15s;
    }
    .preset-color:hover { transform: scale(1.15); }
    .preset-color.selected { border-color: #fff; }
    .unit-colors { display: flex; flex-wrap: wrap; gap: 4px; max-height: 140px; overflow-y: auto; }
    .unit-color-item {
      display: flex; align-items: center; gap: 3px;
      background: #0f3460; padding: 3px 6px; border-radius: 4px; font-size: 0.68rem;
    }
    .unit-color-item span { color: #888; }
    .unit-color-item input[type="color"] { width: 22px; height: 22px; }
    .btn-row { display: flex; gap: 8px; }
    button {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      cursor: pointer; font-family: inherit; font-size: 0.82rem; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-clear { background: #e94560; color: #fff; }
    .btn-fill { background: #00ff88; color: #1a1a2e; }
    .preview-area {
      flex: 1; background: #000; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; min-height: 400px;
    }
    #canvas { image-rendering: pixelated; }
    .preview-label {
      position: absolute; bottom: 8px; right: 12px;
      font-size: 0.65rem; color: #333;
    }
    @media (max-width: 768px) {
      .container { flex-direction: column-reverse; }
      .panel { min-width: unset; max-width: unset; max-height: none; }
      .preview-area { min-height: 300px; }
    }
  </style>
</head>
<body>
  <h1>◆ 点阵屏模拟器 ◆</h1>

  <div class="container">
    <div class="panel">
      <div class="panel-section">
        <h3>布局配置</h3>
        <div class="row">
          <label>竖排:</label>
          <input type="number" id="rows" min="1" max="10" value="3">
          <label>横排:</label>
          <input type="number" id="cols" min="1" max="10" value="4">
          <button onclick="applyLayout()" style="flex:0;padding:6px 12px;background:#00ff88;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;">应用</button>
        </div>
      </div>

      <div class="panel-section">
        <h3>文字显示</h3>
        <input type="text" id="textInput" placeholder="输入文字..." value="Hello">
        <div class="row">
          <label>字体大小</label>
          <input type="range" id="fontSize" min="8" max="20" value="10">
          <span class="value-display" id="fontSizeVal">10px</span>
        </div>
      </div>

      <div class="panel-section">
        <h3>显示模式</h3>
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeScroll" onclick="setMode('scroll')">滚动字幕</button>
          <button class="mode-btn" id="modeStatic" onclick="setMode('static')">静态显示</button>
        </div>
        <div class="row">
          <label>滚动速度</label>
          <input type="number" id="speed" min="1" max="200" value="20" style="width:60px;">
          <span class="value-display">ms/步</span>
        </div>
      </div>

      <div class="panel-section">
        <h3>文字颜色</h3>
        <div class="color-presets" id="textPresets"></div>
        <div class="row" style="margin-top:4px;">
          <label>自选颜色</label>
          <input type="color" id="textColorPicker" value="#ff0000" onchange="setTextColor(this.value)">
        </div>
      </div>

      <div class="panel-section">
        <h3>每个单元的颜色</h3>
        <div class="color-presets" id="unitPresets"></div>
        <div class="unit-colors" id="unitColors"></div>
      </div>

      <div class="panel-section">
        <h3>亮度调节</h3>
        <div class="row">
          <label>亮度</label>
          <input type="range" id="brightness" min="20" max="100" value="100">
          <span class="value-display" id="brightnessVal">100%</span>
        </div>
      </div>

      <div class="panel-section">
        <div class="btn-row">
          <button class="btn-clear" onclick="clearAll()">清屏</button>
          <button class="btn-fill" onclick="fillAll()">全亮</button>
        </div>
      </div>
    </div>

    <div class="preview-area">
      <canvas id="canvas"></canvas>
      <div class="preview-label">预览区域</div>
    </div>
  </div>

  <script>
    const UNIT = 8;
    const LED_SIZE = 5;
    const LED_GAP = 1.5;
    const CELL = LED_SIZE + LED_GAP;
    const SCALE = 2;
    const FONT_SCALE = 1.2;

    let config = {
      rows: 3,
      cols: 4,
      text: 'Hello',
      fontSize: 10,
      mode: 'scroll',
      speed: 20,
      brightness: 1,
      textColor: '#ff0000',
      unitColors: [],
      scrollOffset: 0,
      animId: null,
      textWidthCache: 0,
      fontLoaded: false,
    };

    const TEXT_PRESETS = [
      { hex: '#ff0000' }, { hex: '#00ff00' }, { hex: '#0088ff' },
      { hex: '#ffff00' }, { hex: '#00ffff' }, { hex: '#ff00ff' },
      { hex: '#ff8800' }, { hex: '#ffffff' }
    ];

    const UNIT_PRESETS = [
      { hex: '#ff0000' }, { hex: '#00ff00' }, { hex: '#0088ff' },
      { hex: '#ffff00' }, { hex: '#00ffff' }, { hex: '#ff00ff' },
      { hex: '#ff8800' }, { hex: '#ffffff' }
    ];

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function init() {
      initUnitColors();
      renderTextPresets();
      renderUnitPresets();
      renderUnitColors();
      applyLayout();
      bindEvents();
      // 等待字体加载后再开始动画
      document.fonts.ready.then(() => {
        config.fontLoaded = true;
        config.textWidthCache = measureTextWidth(config.text, config.fontSize);
        draw();
        startAnim();
      });
    }

    function initUnitColors() {
      config.unitColors = [];
      for (let i = 0; i < config.rows * config.cols; i++) {
        config.unitColors.push(UNIT_PRESETS[0].hex);
      }
    }

    function measureTextWidth(text, fontSize) {
      const tmpCanvas = document.createElement('canvas');
      const tmpCtx = tmpCanvas.getContext('2d');
      tmpCtx.font = `${fontSize * SCALE * FONT_SCALE}px 'Roboto Mono', monospace`;
      return tmpCtx.measureText(text).width;
    }

    function renderPresets(containerId, presets, selectedIdx, onclick) {
      const c = document.getElementById(containerId);
      c.innerHTML = '';
      presets.forEach((p, i) => {
        const d = document.createElement('div');
        d.className = 'preset-color' + (i === selectedIdx ? ' selected' : '');
        d.style.background = p.hex;
        d.onclick = () => {
          document.querySelectorAll('#' + containerId + ' .preset-color').forEach(x => x.classList.remove('selected'));
          d.classList.add('selected');
          onclick(p.hex);
        };
        c.appendChild(d);
      });
    }

    function renderTextPresets() {
      renderPresets('textPresets', TEXT_PRESETS, 0, hex => setTextColor(hex));
    }

    function renderUnitPresets() {
      renderPresets('unitPresets', UNIT_PRESETS, 0, hex => {
        for (let j = 0; j < config.unitColors.length; j++) config.unitColors[j] = hex;
        renderUnitColors();
        draw();
      });
    }

    function renderUnitColors() {
      const c = document.getElementById('unitColors');
      c.innerHTML = '';
      for (let i = 0; i < config.unitColors.length; i++) {
        const d = document.createElement('div');
        d.className = 'unit-color-item';
        d.innerHTML = `
          <span>${Math.floor(i / config.cols) + 1}-${(i % config.cols) + 1}</span>
          <input type="color" value="${config.unitColors[i]}" onchange="setUnitColor(${i}, this.value)">
        `;
        c.appendChild(d);
      }
    }

    function setUnitColor(idx, color) {
      config.unitColors[idx] = color;
      draw();
    }

    function setTextColor(color) {
      config.textColor = color;
      document.getElementById('textColorPicker').value = color;
      draw();
    }

    function bindEvents() {
      document.getElementById('fontSize').addEventListener('input', e => {
        config.fontSize = parseInt(e.target.value);
        document.getElementById('fontSizeVal').textContent = config.fontSize + 'px';
        config.textWidthCache = measureTextWidth(config.text, config.fontSize);
        draw();
      });
      document.getElementById('speed').addEventListener('change', e => {
        config.speed = parseInt(e.target.value) || 20;
      });
      document.getElementById('textInput').addEventListener('input', e => {
        config.text = e.target.value || ' ';
        config.scrollOffset = 0;
        config.textWidthCache = measureTextWidth(config.text, config.fontSize);
        draw();
      });
      document.getElementById('brightness').addEventListener('input', e => {
        config.brightness = parseInt(e.target.value) / 100;
        document.getElementById('brightnessVal').textContent = e.target.value + '%';
        draw();
      });
    }

    function applyLayout() {
      config.rows = parseInt(document.getElementById('rows').value) || 3;
      config.cols = parseInt(document.getElementById('cols').value) || 4;
      config.scrollOffset = 0;
      initUnitColors();
      renderUnitColors();
      config.textWidthCache = measureTextWidth(config.text, config.fontSize);
      resizeCanvas();
      draw();
    }

    function resizeCanvas() {
      const area = document.querySelector('.preview-area');
      const maxW = area.clientWidth - 40;
      const maxH = area.clientHeight - 60;
      const w = config.cols * UNIT * CELL;
      const h = config.rows * UNIT * CELL;
      const s = Math.min(maxW / w, maxH / h, 1.5);
      canvas.width = w;
      canvas.height = h;
      canvas.style.width = (w * s) + 'px';
      canvas.style.height = (h * s) + 'px';
    }

    function setMode(m) {
      config.mode = m;
      document.getElementById('modeScroll').classList.toggle('active', m === 'scroll');
      document.getElementById('modeStatic').classList.toggle('active', m === 'static');
      if (m === 'static') stopAnim();
      else { config.scrollOffset = 0; startAnim(); }
    }

    function startAnim() {
      if (config.animId) return;
      let last = 0;
      function tick(t) {
        if (t - last >= config.speed) {
          last = t;
          config.scrollOffset++;
          draw();
        }
        config.animId = requestAnimationFrame(tick);
      }
      config.animId = requestAnimationFrame(tick);
    }

    function stopAnim() {
      if (config.animId) { cancelAnimationFrame(config.animId); config.animId = null; }
    }

    function clearAll() {
      stopAnim();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function fillAll() {
      stopAnim();
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.shadowBlur = 5 * config.brightness;
      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const i = r * config.cols + c;
          ctx.shadowColor = config.unitColors[i];
          ctx.fillStyle = config.unitColors[i];
          for (let ly = 0; ly < UNIT; ly++) {
            for (let lx = 0; lx < UNIT; lx++) {
              const px = c * UNIT * CELL + lx * CELL;
              const py = r * UNIT * CELL + ly * CELL;
              ctx.beginPath();
              ctx.arc(px + LED_SIZE/2, py + LED_SIZE/2, LED_SIZE/2, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }
    }

    function draw() {
      const totalW = config.cols * UNIT;
      const totalH = config.rows * UNIT;
      const ocW = totalW * SCALE;
      const ocH = totalH * SCALE;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const oc = document.createElement('canvas');
      oc.width = ocW;
      oc.height = ocH;
      const octx = oc.getContext('2d');

      octx.fillStyle = '#000';
      octx.fillRect(0, 0, ocW, ocH);
      octx.fillStyle = '#fff';
      octx.font = `${config.fontSize * SCALE * FONT_SCALE}px 'Roboto Mono', monospace`;
      octx.textAlign = 'center';
      octx.textBaseline = 'middle';

      let textX;
      if (config.mode === 'scroll') {
        // 滚动：文字从右边进来
        // scrollOffset=0: 文字最右边刚好在屏幕最右边 (ocW + textWidth/2)
        // 每次减少scrollOffset，直到文字完全滚出左边
        const maxOffset = Math.ceil((ocW + config.textWidthCache) / SCALE);
        if (config.scrollOffset > maxOffset) config.scrollOffset = 0;
        textX = ocW + config.textWidthCache / 2 - config.scrollOffset * SCALE;
      } else {
        textX = ocW / 2;
      }

      octx.fillText(config.text, textX, ocH / 2);

      const imgData = octx.getImageData(0, 0, ocW, ocH).data;

      for (let r = 0; r < config.rows; r++) {
        for (let c = 0; c < config.cols; c++) {
          const i = r * config.cols + c;
          const color = config.unitColors[i];
          ctx.shadowBlur = 8 * config.brightness;
          ctx.shadowColor = color;
          ctx.fillStyle = color;

          for (let ly = 0; ly < UNIT; ly++) {
            for (let lx = 0; lx < UNIT; lx++) {
              const gx = c * UNIT + lx;
              const gy = r * UNIT + ly;
              const sx = gx * SCALE;
              const sy = gy * SCALE;

              // 检查像素是否在文字范围内（使用多个采样点）
              let lit = false;
              for (let dy = 0; dy < SCALE && !lit; dy++) {
                for (let dx = 0; dx < SCALE && !lit; dx++) {
                  const px = sx + dx;
                  const py = sy + dy;
                  if (px >= ocW || py >= ocH) continue;
                  const idx = (py * ocW + px) * 4;
                  if (imgData[idx] > 50) lit = true;
                }
              }

              if (lit) {
                const canvasX = c * UNIT * CELL + lx * CELL;
                const canvasY = r * UNIT * CELL + ly * CELL;
                ctx.beginPath();
                ctx.arc(canvasX + LED_SIZE/2, canvasY + LED_SIZE/2, LED_SIZE/2, 0, Math.PI * 2);
                ctx.fill();
              }
            }
          }
        }
      }
    }

    window.addEventListener('resize', () => { resizeCanvas(); draw(); });
    init();
  </script>
</body>
</html>
